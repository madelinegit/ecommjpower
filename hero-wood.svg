    <path d="M447,232 Q505,225 565,234"/>
    <path d="M447,280 Q507,273 565,282"/>
    <path d="M447,328 Q506,321 565,330"/>
    <path d="M447,376 Q505,369 565,378"/>
    <path d="M447,426 Q507,419 565,428"/>
    <path d="M447,474 Q506,467 565,476"/>

    <path d="M565,36 Q619,30 674,38"/>
    <path d="M565,82 Q618,76 674,84"/>
