    <path d="M221,476 Q280,469 337,478"/>

    <path d="M337,38 Q392,32 447,40"/>
    <path d="M337,84 Q391,77 447,86"/>
    <path d="M337,132 Q393,125 447,134"/>
    <path d="M337,180 Q392,173 447,182"/>
    <path d="M337,228 Q391,221 447,230"/>
    <path d="M337,276 Q393,269 447,278"/>
    <path d="M337,324 Q392,317 447,326"/>
    <path d="M337,372 Q391,365 447,374"/>
    <path d="M337,422 Q393,415 447,424"/>
    <path d="M337,470 Q392,463 447,472"/>

    <path d="M447,42 Q506,35 565,44"/>
    <path d="M447,88 Q505,81 565,90"/>
