    <path d="M674,472 Q737,465 800,474"/>
  </g>

  <!-- Lighter grain highlight lines -->
  <g opacity="0.12" stroke="#e8a040" stroke-width="0.7" fill="none">
    <path d="M0,60 Q56,54 113,62"/>
    <path d="M0,148 Q55,142 113,150"/>
    <path d="M0,240 Q57,233 113,242"/>
    <path d="M0,334 Q54,328 113,336"/>
    <path d="M0,430 Q56,424 113,432"/>
    <path d="M113,58 Q167,52 221,60"/>
    <path d="M221,56 Q279,50 337,58"/>
    <path d="M337,60 Q392,54 447,62"/>
    <path d="M447,56 Q506,50 565,58"/>
    <path d="M565,54 Q619,48 674,56"/>
    <path d="M674,58 Q737,52 800,60"/>
    <path d="M113,152 Q165,146 221,154"/>
    <path d="M221,148 Q280,141 337,150"/>
    <path d="M337,154 Q391,147 447,156"/>
    <path d="M447,150 Q507,143 565,152"/>
    <path d="M565,146 Q618,139 674,148"/>
    <path d="M674,152 Q737,145 800,154"/>
  </g>

  <!-- === WOOD KNOT — plank 2 === -->
  <g transform="translate(165, 200)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="22" ry="18" fill="#3a1e0a" stroke="#1e0e04" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="14" ry="11" fill="#2a1206" stroke="#150804" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="7" ry="5" fill="#1a0a04"/>
    <path d="M-22,0 Q-35,-8 -50,-4" fill="none" stroke="#3a1e0a" stroke-width="1.5" opacity="0.7"/>
    <path d="M22,0 Q35,6 52,2" fill="none" stroke="#3a1e0a" stroke-width="1.5" opacity="0.7"/>
    <path d="M-20,-6 Q-32,-16 -48,-14" fill="none" stroke="#3a1e0a" stroke-width="1" opacity="0.5"/>
    <path d="M20,6 Q32,14 50,12" fill="none" stroke="#3a1e0a" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- === WOOD KNOT — plank 5 === -->
  <g transform="translate(510, 340)" opacity="0.55">
    <ellipse cx="0" cy="0" rx="18" ry="15" fill="#3a1e0a" stroke="#1e0e04" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="11" ry="9" fill="#2a1206" stroke="#150804" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="5" ry="4" fill="#1a0a04"/>
    <path d="M-18,0 Q-30,-6 -45,-3" fill="none" stroke="#3a1e0a" stroke-width="1.2" opacity="0.6"/>
    <path d="M18,0 Q30,5 46,2" fill="none" stroke="#3a1e0a" stroke-width="1.2" opacity="0.6"/>
  </g>

  <!-- === SMALL KNOT — plank 6 === -->
  <g transform="translate(618, 130)" opacity="0.45">
    <ellipse cx="0" cy="0" rx="12" ry="10" fill="#3a1e0a" stroke="#1e0e04" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="7" ry="6" fill="#2a1206"/>
    <ellipse cx="0" cy="0" rx="3" ry="2.5" fill="#1a0a04"/>
    <path d="M-12,0 Q-22,-4 -34,-2" fill="none" stroke="#3a1e0a" stroke-width="1" opacity="0.5"/>
    <path d="M12,0 Q22,4 35,2" fill="none" stroke="#3a1e0a" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- === STAINED GLASS LANTERN (right side decoration) === -->
  <g transform="translate(620, 80)" opacity="0.18">
    <!-- lantern body outline -->
    <rect x="-30" y="40" width="60" height="90" rx="4" fill="none" stroke="#c8a96e" stroke-width="2"/>
    <polygon points="0,-5 -40,40 40,40" fill="none" stroke="#c8a96e" stroke-width="2"/>
    <path d="M-12,-5 Q0,-18 12,-5" fill="none" stroke="#c8a96e" stroke-width="2"/>
    <rect x="-34" y="128" width="68" height="7" rx="2" fill="none" stroke="#c8a96e" stroke-width="1.5"/>
    <!-- panes -->
    <line x1="0" y1="40" x2="0" y2="130" stroke="#c8a96e" stroke-width="1.2"/>
    <line x1="-30" y1="85" x2="30" y2="85" stroke="#c8a96e" stroke-width="1.2"/>
    <rect x="-29" y="41" width="28" height="43" fill="#1a6b4a" opacity="0.4"/>
    <rect x="1" y="41" width="28" height="43" fill="#7b2d8b" opacity="0.4"/>
    <rect x="-29" y="86" width="28" height="43" fill="#b5420a" opacity="0.4"/>
    <rect x="1" y="86" width="28" height="43" fill="#1a4a8a" opacity="0.4"/>
  </g>

  <!-- === WARM GLOW (candle/lantern effect) === -->
  <rect x="0" y="0" width="800" height="500" fill="url(#glow)"/>

  <!-- === DARK OVERLAY for text legibility === -->
  <rect x="0" y="0" width="800" height="500" fill="url(#overlay)"/>

  <!-- === VIGNETTE === -->
  <rect x="0" y="0" width="800" height="500" fill="url(#vignette)"/>

  <!-- === SUBTLE DUST PARTICLES === -->
  <g opacity="0.3" fill="#c8a040">
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="340" cy="55" r="0.8"/>
    <circle cx="580" cy="90" r="1.4"/>
    <circle cx="720" cy="40" r="0.9"/>
    <circle cx="200" cy="420" r="1.1"/>
    <circle cx="460" cy="440" r="0.7"/>
    <circle cx="650" cy="410" r="1.3"/>
    <circle cx="80" cy="350" r="0.9"/>
  </g>
</svg>
