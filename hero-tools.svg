<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bggrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1408"/>
      <stop offset="50%" stop-color="#121a0a"/>
      <stop offset="100%" stop-color="#0a0e06"/>
    </linearGradient>
    <linearGradient id="overlay2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1206" stop-opacity="0.2"/>
      <stop offset="55%" stop-color="#0a1206" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#060a04" stop-opacity="0.88"/>
    </linearGradient>
    <radialGradient id="vignette2" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#060a04" stop-opacity="0.72"/>
    </radialGradient>
    <!-- Blueprint grid fade -->
    <linearGradient id="gridfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a1a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1a3a1a" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- === DARK BACKGROUND === -->
  <rect width="800" height="500" fill="url(#bggrad)"/>

  <!-- === BLUEPRINT GRID === -->
  <g stroke="#4a7a3a" stroke-width="0.5" opacity="0.18" fill="none">
    <!-- Verticals every 40px -->
    <line x1="40" y1="0" x2="40" y2="500"/>
    <line x1="80" y1="0" x2="80" y2="500"/>
    <line x1="120" y1="0" x2="120" y2="500"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="240" y1="0" x2="240" y2="500"/>
    <line x1="280" y1="0" x2="280" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="440" y1="0" x2="440" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="520" y1="0" x2="520" y2="500"/>
    <line x1="560" y1="0" x2="560" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
    <line x1="680" y1="0" x2="680" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
    <line x1="760" y1="0" x2="760" y2="500"/>
    <!-- Horizontals every 40px -->
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="440" x2="800" y2="440"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
  </g>
  <!-- Thicker grid every 200px -->
  <g stroke="#4a7a3a" stroke-width="1.2" opacity="0.14" fill="none">
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
  </g>

  <!-- === HAMMER (left, large, ghosted) === -->
  <g transform="translate(105, 130) rotate(-30)" opacity="0.13" fill="#c8a96e" stroke="#c8a96e" stroke-width="1">
    <!-- handle -->
    <rect x="-7" y="20" width="14" height="160" rx="5"/>
    <!-- head -->
    <rect x="-35" y="-12" width="70" height="36" rx="6"/>
    <!-- face -->
    <rect x="28" y="-8" width="20" height="28" rx="3" fill="#b89050"/>
    <!-- top of head claw -->
    <path d="M-35,-12 L-52,-32 L-38,-32 L-26,-12 Z" fill="#c8a96e"/>
  </g>

  <!-- === WRENCH (right, large, ghosted) === -->
  <g transform="translate(660, 160) rotate(25)" opacity="0.11" fill="none" stroke="#c8a96e" stroke-width="3" stroke-linecap="round">
    <!-- handle -->
    <line x1="0" y1="50" x2="0" y2="200"/>
    <!-- wrench head open end -->
    <path d="M-22,-10 L-22,-40 Q-22,-60 0,-60 Q22,-60 22,-40 L22,-10"/>
    <path d="M-22,-10 L-28,10 L-14,10 L0,-5 L14,10 L28,10 L22,-10"/>
    <!-- wrench head closed end -->
    <circle cx="0" cy="200" r="18" fill="none"/>
    <circle cx="0" cy="200" r="8" fill="#c8a96e" opacity="0.4"/>
  </g>

  <!-- === SAW (top center, ghosted) === -->
  <g transform="translate(350, 30)" opacity="0.09" fill="none" stroke="#c8a96e" stroke-width="1.5">
    <!-- blade -->
    <rect x="-120" y="-8" width="240" height="18" rx="2"/>
    <!-- teeth -->
    <path d="M-120,10 L-112,22 L-104,10 L-96,22 L-88,10 L-80,22 L-72,10 L-64,22 L-56,10 L-48,22 L-40,10 L-32,22 L-24,10 L-16,22 L-8,10 L0,22 L8,10 L16,22 L24,10 L32,22 L40,10 L48,22 L56,10 L64,22 L72,10 L80,22 L88,10 L96,22 L104,10 L112,22 L120,10" stroke-linejoin="miter"/>
    <!-- handle -->
    <rect x="-150" y="-20" width="38" height="42" rx="8"/>
    <rect x="-146" y="-14" width="30" height="30" rx="6"/>
  </g>

  <!-- === TAPE MEASURE (bottom left) === -->
  <g transform="translate(80, 390)" opacity="0.1" fill="none" stroke="#c8a96e" stroke-width="1.5">
    <circle cx="0" cy="0" r="40"/>
    <circle cx="0" cy="0" r="28"/>
    <!-- belt clip -->
    <rect x="-10" y="-52" width="20" height="18" rx="3"/>
    <!-- extend line -->
    <line x1="40" y1="0" x2="120" y2="0"/>
    <line x1="120" y1="-8" x2="120" y2="8"/>
    <!-- tick marks -->
    <line x1="60" y1="0" x2="60" y2="-5"/>
    <line x1="80" y1="0" x2="80" y2="-8"/>
    <line x1="100" y1="0" x2="100" y2="-5"/>
  </g>

  <!-- === LEVEL (bottom right) === -->
  <g transform="translate(560, 440)" opacity="0.1" fill="none" stroke="#c8a96e" stroke-width="1.5">
    <rect x="-120" y="-18" width="240" height="36" rx="6"/>
    <!-- bubble vials -->
    <ellipse cx="-60" cy="0" rx="28" ry="12"/>
    <ellipse cx="-60" cy="0" rx="8" ry="6" stroke-width="1"/>
    <ellipse cx="60" cy="0" rx="28" ry="12"/>
    <ellipse cx="60" cy="0" rx="8" ry="6" stroke-width="1"/>
    <!-- center mark -->
    <line x1="-60" y1="-12" x2="-60" y2="12"/>
    <line x1="60" y1="-12" x2="60" y2="12"/>
  </g>

  <!-- === CHISEL (mid right) === -->
  <g transform="translate(740, 290) rotate(-15)" opacity="0.1" fill="none" stroke="#c8a96e" stroke-width="1.5">
    <rect x="-8" y="-80" width="16" height="140" rx="3"/>
    <polygon points="-10,60 10,60 6,90 -6,90" fill="#c8a96e" opacity="0.4"/>
    <rect x="-10" y="-100" width="20" height="30" rx="4" fill="#c8a96e" opacity="0.3"/>
  </g>

  <!-- === NAILS (scattered) === -->
  <g stroke="#c8a96e" stroke-width="1.5" opacity="0.1" stroke-linecap="round">
    <line x1="200" y1="300" x2="200" y2="370"/>
    <circle cx="200" cy="295" r="5" fill="#c8a96e" stroke="none" opacity="0.4"/>
    <line x1="215" y1="305" x2="215" y2="370"/>
    <circle cx="215" cy="300" r="5" fill="#c8a96e" stroke="none" opacity="0.4"/>
    <line x1="230" y1="310" x2="230" y2="370"/>
    <circle cx="230" cy="305" r="5" fill="#c8a96e" stroke="none" opacity="0.4"/>
  </g>

  <!-- === CROSSED HAMMER & WRENCH (center emblem) === -->
  <g transform="translate(400, 230)" opacity="0.22">
    <!-- wrench -->
    <g fill="none" stroke="#c8a96e" stroke-width="4" stroke-linecap="round" transform="rotate(-45)">
      <line x1="0" y1="-80" x2="0" y2="80"/>
      <path d="M-20,-68 Q-20,-95 0,-95 Q20,-95 20,-68"/>
      <path d="M-20,-68 L-26,-50 L-14,-50 Z"/>
      <path d="M20,-68 L26,-50 L14,-50 Z"/>
      <circle cx="0" cy="80" r="22" fill="none"/>
      <circle cx="0" cy="80" r="10" fill="#c8a96e" opacity="0.5"/>
    </g>
    <!-- hammer -->
    <g fill="none" stroke="#c8a96e" stroke-width="4" stroke-linecap="round" transform="rotate(45)">
      <line x1="0" y1="-20" x2="0" y2="90"/>
      <rect x="-28" y="-55" width="56" height="40" rx="6" fill="none"/>
      <rect x="22" y="-50" width="18" height="30" rx="3" fill="#c8a96e" opacity="0.3" stroke="none"/>
    </g>
    <!-- outer ring -->
    <circle cx="0" cy="0" r="105" fill="none" stroke="#c8a96e" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="112" fill="none" stroke="#c8a96e" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- === RULER MARKINGS (top edge) === -->
  <g stroke="#c8a96e" stroke-width="1" opacity="0.12">
    <line x1="0" y1="8" x2="800" y2="8"/>
    <line x1="0" y1="16" x2="800" y2="16"/>
    <!-- ticks every 20px, tall every 100px -->
    <line x1="100" y1="8" x2="100" y2="28"/>
    <line x1="200" y1="8" x2="200" y2="28"/>
    <line x1="300" y1="8" x2="300" y2="28"/>
    <line x1="400" y1="8" x2="400" y2="28"/>
    <line x1="500" y1="8" x2="500" y2="28"/>
    <line x1="600" y1="8" x2="600" y2="28"/>
    <line x1="700" y1="8" x2="700" y2="28"/>
    <line x1="50" y1="8" x2="50" y2="20"/>
    <line x1="150" y1="8" x2="150" y2="20"/>
    <line x1="250" y1="8" x2="250" y2="20"/>
    <line x1="350" y1="8" x2="350" y2="20"/>
    <line x1="450" y1="8" x2="450" y2="20"/>
    <line x1="550" y1="8" x2="550" y2="20"/>
    <line x1="650" y1="8" x2="650" y2="20"/>
    <line x1="750" y1="8" x2="750" y2="20"/>
  </g>

  <!-- === WARM AMBER LIGHT SPLASH (lower left) === -->
  <radialGradient id="ambersplash" cx="18%" cy="82%" r="45%">
    <stop offset="0%" stop-color="#c87820" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#ambersplash)"/>

  <!-- === OVERLAY for text legibility === -->
  <rect width="800" height="500" fill="url(#overlay2)"/>

  <!-- === VIGNETTE === -->
  <rect width="800" height="500" fill="url(#vignette2)"/>
</svg>
