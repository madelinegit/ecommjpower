<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Wood grain base filter -->
    <filter id="woodgrain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.6" numOctaves="4" seed="8" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feComponentTransfer in="gray" result="contrast">
        <feFuncR type="gamma" amplitude="1.4" exponent="0.6" offset="-0.1"/>
        <feFuncG type="gamma" amplitude="1.2" exponent="0.7" offset="-0.05"/>
        <feFuncB type="gamma" amplitude="0.9" exponent="0.8" offset="-0.1"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="contrast" mode="multiply" result="blend"/>
    </filter>

    <!-- Soft vignette radial -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#0d0804" stop-opacity="0.75"/>
    </radialGradient>

    <!-- Overlay gradient top-to-bottom for text legibility -->
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f06" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#1a0f06" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0d0804" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Glow for lantern light effect -->
    <radialGradient id="glow" cx="72%" cy="38%" r="30%">
      <stop offset="0%" stop-color="#c8a030" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Wood ring pattern clip -->
    <clipPath id="woodclip">
      <rect width="800" height="500"/>
    </clipPath>
  </defs>

  <!-- === BASE WOOD PLANK COLORS === -->
  <!-- Plank 1 -->
  <rect x="0" y="0" width="113" height="500" fill="#6b3c18"/>
  <!-- Plank 2 -->
  <rect x="113" y="0" width="108" height="500" fill="#7a4520"/>
  <!-- Plank 3 -->
  <rect x="221" y="0" width="116" height="500" fill="#5e3314"/>
  <!-- Plank 4 -->
  <rect x="337" y="0" width="110" height="500" fill="#70401c"/>
  <!-- Plank 5 -->
  <rect x="447" y="0" width="118" height="500" fill="#7c4822"/>
  <!-- Plank 6 -->
  <rect x="565" y="0" width="109" height="500" fill="#623718"/>
  <!-- Plank 7 -->
  <rect x="674" y="0" width="126" height="500" fill="#6e3e1e"/>

  <!-- Plank dividers -->
  <line x1="113" y1="0" x2="113" y2="500" stroke="#2a1206" stroke-width="2.5"/>
  <line x1="221" y1="0" x2="221" y2="500" stroke="#1e0e04" stroke-width="3"/>
  <line x1="337" y1="0" x2="337" y2="500" stroke="#2a1206" stroke-width="2"/>
  <line x1="447" y1="0" x2="447" y2="500" stroke="#1e0e04" stroke-width="3.5"/>
  <line x1="565" y1="0" x2="565" y2="500" stroke="#2a1206" stroke-width="2.5"/>
  <line x1="674" y1="0" x2="674" y2="500" stroke="#1e0e04" stroke-width="2"/>

  <!-- === WOOD GRAIN LINES (horizontal flowing) === -->
  <g opacity="0.25" stroke="#200e04" stroke-width="1" fill="none">
    <!-- Natural grain curves per plank -->
    <path d="M0,42 Q56,38 113,44"/>
    <path d="M0,86 Q55,80 113,90"/>
    <path d="M0,130 Q58,124 113,132"/>
    <path d="M0,174 Q54,170 113,177"/>
    <path d="M0,218 Q57,213 113,220"/>
